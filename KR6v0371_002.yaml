body:
  text: 世界佛學苑漢藏教理院法尊譯述第二目尊者所證功德修已所證功德類攝為三初殷重修持二本尊現身三證諸神通初大小顯密一切修持悉不出戒定慧三學定慧以止觀攝納止觀後有世出世別密乘攝入二種次是諸功德恐繁且止戒為一切善法基礎尊者自云別解脫戒曾未少犯菩提戒及密宗三昧耶諸微小者時或有違然悉即日悔除未曾與罪同宿云云有問尊者出家以來曾趣入人法處否謂親近俗人往俗人談論世法之處對曰彼不喜我我亦不喜彼從未曾去又問親里曾有來尊者處者否曰曾來一次我勸彼往學功德不聽而去餘未曾也又問凡諸女人什物尊者曾未手受如是持律精嚴故身具戒香遙至即聞也尊者深以慈悲潤澤身心菩提心增上心清淨堅固六度四攝是其常法於諸弟子亦唯以菩提心教授而教授之故徒眾依菩提心得成就及神通者不可勝數曾有弟子住止迦摩尸羅寺時諸僧眾皆受施請唯餘彼年少苾芻在寺有一近事欲請彼供養見彼苾芻於窗戶中東觀西望見無餘人遂以神足騰空往北俱盧取衣滿鉢而回彼居士見之欲告尊者未果明年又見如前告尊者知尊者遂問其事弟子答曰實爾問以何力答是菩提心力尊者喜曰實也任比何法唯菩提心功德最大云云尊者又有一弟子任其如何修行終不成就尊者告曰可修慈悲及菩提心彼依教修立得悉地菩提地中說菩提心功德悉皆同此又有一修明王法者口目皆圓成忿怒相人若視之被視者即死尊者教修慈悲及菩提心後視之不至死尊者臨赴藏時謂口目漸復原也尊者至藏後專教後學修菩提心曰若無菩提心雖聽聞多法思擇修習生次滿次中觀念誦等悉皆無益菩提未攝持之善行及防害菩提心之善行悉屬魔業菩提未攝持之一切身語善行多為無明緣生諸行多屬集諦云云此數語似稍寬泛但若將菩提心之因果眷屬攝入其中言亦無過或約障碍成佛者為魔業凡非能證無住湼槃法皆非大乘道諦為言亦無過失種敦仁波卿等諸大善知識皆依尊者之菩提心教授修行見多本尊證廣大神境獲得諸品成就至今藏中修菩提心法悉依尊者傳承為主也二見本尊之功德者尊者所見諸佛菩薩不可量計曾依如來百字教授見十方佛其常現身者則有建立三三昧耶王聖觀自在聖救度母聖不動尊勝樂輪喜金剛之六尊者在印度時每念三昧耶王滿千遍時定一現身至藏之後每日一現是尊者自述聖觀自在及度母隨念即現凡有所為悉為記莂不動尊者亦然其餘二尊為尊者密部之本尊現身亦為常事三尊者神通事迹甚繁傳中亦徧布故不特錄也第二章宏法利生廣大事業第一段住大菩提寺宏法利生事業分任金剛座大菩提寺住止迦摩羅尸羅寺受大德菩提光請赴藏宏法利生之三初尊者自金洲返贍部已住大菩提寺專修寺中有觀自在聖像時有無嗣之老夫婦二人修廣大供養一夜老夫於夢中有菩薩告曰莫供我此處有勝然燈智苾芻可供養彼福德極大次早老夫至四根本部中問之悉答無其人後有說一切有部之長老告曰昨來一客苾芻現住客室可問是否答曰是若爾願受我食為我供處尊者受許遂住金剛座寺爾時尊者作如是念今從諸師學法已訖亦見多本尊後得多種成就亦現見多數密咒壇輪謂見本尊宮殿眷屬等圓滿之曼陀羅今當專住一心速證正覺也尊者起此念已前住里山寺之羅睺羅笈多金剛以通力降臨告尊者曰僅見本尊壇輪得其成就三摩地等全無所至仍當專修慈悲及菩提心大悲是悲心菩薩故當依之為本尊乃至未空以來利益有情修行正法云云尊者前依金洲大師獲得決定今猶決定尊者繞金剛座時於繞道處有諸泥像一像起立問餘像云欲速證等正覺當學何法彼像答曰欲速證等正覺者應學菩提心也又問云菩提心當如何修答如是修遂說一依顯教修菩提心之善方便門尊者住而聽之悉能了解尊者自云彼二像是真化身為使心見決定假作問答非彼不知故問也又於異日繞金剛座時見金剛座南方空中有二童女勝出人身相同天女其一問云願速證等正覺當學何法一答曰應學菩提心也又問曰如何修遂說一依咒軌菩提心之善妙方便尊者住聽亦悉解了如器注器彼二童女亦非不知故問尊者自謂是度母與怒相母也尊者又繞降魔窣都彼時亦依二婦人聞菩提心法是空行母又見度母殿前有老幼二婦人亦問答如前又繞金剛座寺時寺簷下之佛像繞龍猛菩薩所建之金剛須彌時象牙釋迦牟尼佛像等皆囑令修菩提心法如是等類尚繁尊者受諸佛菩薩瑜伽男女師長慈誨獲得無量教授教誡作是念云為欲圓滿一切諸佛菩薩意念隨順一切師長言教成辦自他圓滿利樂除菩提心更無餘法今唯當依大悲為本尊修菩提心而無他也次住金剛座西阿彌陀殿修慈心時大悲觀自在現身慰曰善士善哉善哉作所應作三世一切諸佛密藏汝今了知此之北方有我國土天女度母亦在彼處作有情事汝所化者亦多在彼當往北方也又往金剛座摩底寺朝度母殿時適逢殿主鎖門他去尊者住於慈心待之殿中一切悉見無餘後殿主至啟戶觀之與定中見者一無所異尊者依慈定力獲得諸三摩地廣大神通見無量諸佛菩薩饒益無邊有情時摩羯陀一切道場及無量出家在家瑜伽男女大善巧者悉頂戴尊者如如意摩尼立正破邪俱著名於此時也第二段住止迦摩羅尸羅寺住止迦摩羅尸羅寺有譯戒香寺者有謂彼是藥叉之名建寺鎮壓應名鎮藥叉寺有謂比札摩羅譯映蔽尸羅譯戒應名戒映蔽寺等等此寺初為護法王所建建寺因緣恐繁且止常供四部大德每部二十七人共百八數又有客苾芻位十二以備遊謁聖迹者住止另有學習聲明因明等院共約二百僧侶悉是三藏法師五明俊彥其最著名於當時者五十有七也彼皆恭敬頂戴者則為阿底峽尊者耳尊者住金剛座寺盛名遠覆五天時止迦摩羅尸羅前文之止迦摩尸羅是略去羅字亦作比札摩羅尸羅主護法王後號大護王者殷勤至誠請為供處時止迦摩畫寺殿之前壁右畫龍猛菩薩左畫尊者意謂德等龍猛殿之左右二壁分畫通達五明之善巧者及得成就者尊者兩壁俱畫意表雙具二德也爾時印度寺規以大善巧掌寺鑰匙尊者持十有八宏法利生固不待言擯教主慈氏即在此時後臨赴藏時鑰匙有百八第三段赴藏宏法第一節略述藏王之系統赴藏宏法分三謂略述藏王系統與佛法興衰及迎尊者因緣尊者途中宏法事業至藏後以至圓寂初藏王之始謂孃持讚近尊音讀薄傳謂自印度來藏人奉以為主也次傳二十八代至拉托托日寧讚王傳謂藥師佛代身略有正法之名又五傳至松讚崗薄王是觀音代身能傳可考迎中國文成公主及尼帕爾公主為妃廣建正法安立有情於十善業道次五傳有謂四傳至持松得讚王延請靜命菩薩蓮花生大師等大善巧者一百餘人廣譯顯密經論度眾出家建立桑耶等諸大寺院所有梵本盡存桑耶後尊者至藏閱時稱讚宏教之盛實為印度所希有王傳位太子雷金允彼有三子謂藏瑪達瑪㘃跋僅也㘃跋僅為王敬重聖教承事三寶尤非前王之可比時有逆臣害王扶達瑪立拆寺焚經殺逐僧侶佛正法為之一滅王有二子曰光護母固光護有子曰勝輪實彼有二子曰勝吉祥積及安樂日依時因朝中不和日依赴哦日哦日民眾迎立為主王有三子曰札喜跋給得祖遂劃哦日為三處補讓與札喜漾溶與跋給芒盂與得祖札喜有二子曰智光係出家諱松得智光有二子名天王龍王松得有一子曰拉得拉得有三子曰啊得靜光菩提光也初為智光攝持王位後見先王盛業志在紹繼欲宏法也遂傳位於姪拉得自與二子俱隨學能仁捨貴出家矣前達瑪滅法時有極明等三苾芻住勝河山修行聞滅法事急將所有典籍載于牦牛逃避青海等處度密意極顯出家近園近園有漢僧二人助伴極顯徧學顯密三藏漸傳法於藏地正法枯芽自是重萌也第二節初次迎請又滅法時有諸在家慢謂住持密教邪解密法見諸不順自所許者輒彼咒殺諍辯衝起延數百年更有一類謂唯修空性一門即能成佛施等福德資糧徒自勞苦而已如是邪知妄解非僅一二故智光見而生悲不忍坐視墮落而不救又見顯密大小言辭違反為一是一非抑言乖義符終含二意難取一決唯有重遊天竺更明聖意始可也遂召集哦日三地十歲以上之童子定其字數限以時間考諸根器得上智者七人俱令其學經出家各給使童二人遣往迦濕密羅求學並屬云須將慶喜藏法一切調伏二種集攝而還若能請得東印度護法者莫惜金財若能請得迦濕密羅寶金剛者亦莫惜金並須訪問有何大德能饒益藏地之有情者諸人依教學法十九人為熱病殞命唯餘寶賢譯師善慧譯師二人而已寶賢生於周世宗五年歲次戊午長尊者二十二歲壽九十八二人徧學顯密斷諸疑懷已議曰今或請能饒益藏人或問知而歸遂賞諸貧人請其代訪未得堪請之人次至止迦摩羅尸羅寺問有能饒益藏人者否有人答曰此有王種出家者號勝然燈智一切佛教徒之頂嚴末法五百年之第二徧智然汝等不能請更無餘人能饒益藏地也二人雖知尊者功德威重然未敢言請遂歸藏地將印度諸時俊所許啟白王知佛因眾生根性利鈍福智厚薄修與未修種種別故施設大小顯密種種次第義實無違也能饒益藏人者印度徧覓未得唯於止迦摩羅尸羅寺有王種出家苾芻為一切佛教徒之頂嚴是大護王自金剛座寺請至者若能請來實能饒益藏地有情寺中諸善巧者皆為授記矣王聞言已餘疑盡除更聞尊者之德深起信敬必須迎請也遂重請譯師號精進師子者授與真金一整錠重拾陸兩更加散碎無數眷屬百許遣往印度迎請尊者譯師奉教至止迦摩羅尸羅將金供上白以迎請之意尊者曰我赴藏者總有二因一謂求金故行然我於金無所用二謂具有捨自愛他之菩提心而行是我亦無故我不行也仍將金還主譯師牽衣涕泣再三祈禱終不蒙聽許爾時譯師眷屬多為熱致死散金亦將盡尊者曰汝藏人實可悲也次譯師回藏白其不堪迎請尊者之任王曰譯師願不辭艱苦棄捨身命尊者未能請者亦無餘法今於尊者以下之大德可請之也譯師承命俱五六眷屬重赴印度第三節第二次迎請時智光法王為籌迎請之順緣故至於邊境被迦羅外道王所執繫閉牢獄時拉尊跋菩提光尊跋譯大德是苾芻尊稱拉譯天是王種之尊稱聞之急整兵往救因外道之兵眾未遂欲重徵兵唯恐有情塗炭惡趣難逃更恐自有不測請尊者之事廢故另設方便以金易人遂面會外道王彼曰汝若廢止迎請尊者之事建我教法非但不須金易我猶當重賞若不爾者則須金與王自相等方放也拉尊跋等徧集藏人資財得金身量尚欠頭許未足外道王仍不放捨時拉尊跋往見智光白云今我更覓頭許來易智光笑曰汝心亦足矣謂汝愛我之心我已知矣不須以金易也然我所想者是非整理藏地法律不可也我今年已衰老自無始以來未曾為法捨身今為法死者甚善此罪惡王一金莫給所有金財皆持往印度奉迎尊者並將我言白尊者知謂我專望尊者及佛聖教故今施身命於惡王之手願一切生中慈悲攝受我心所望者惟願尊者來藏宏法不違所請更願慈悲加持來生定遇尊者汝今心放捨我專思聖教云云拉尊跋回國欲更覓金聞智光已去世遂止其事專謀迎請尊者之法遂請地公塘公塘有二此是哦日公塘也姓那錯諱戒勝之持律苾芻生於宋真宗十四年歲次辛亥恭敬供養已謂曰今請於大律師者不斥其號謂我祖代王臣諸大菩薩或得佛教少許次立正規次廣宏揚但於今世佛教低微魔種熾盛宣揚邪法深生悲愍我叔姪二人實為祖孫藏人隔倫皆曰叔姪徧求愛顧佛教之人至少授以百金遣迎尊者祇因聖教事大故雖未能請至然心猶未死大天指智光往跋盂邊境尼帕爾覔奉尊者所須之金故被迦羅惡王所執廣述上緣云云乃至我雖欲覔金重往聞叔已死汝可具白尊者又應白言我藏地邊方無明所覆之有情尚有如是心力汝指尊者一切眾生所邊依處大悲心者又應何似耶今有純金七百兩供上尊者更當代我白言我藏地如同餓鬼城市雖一粒金貴為大寶今此是我等一切人財畢集也今尊者仍不赴藏則汝善士悲心如此我亦只好任意而行也謂更無他術整頓佛法也拉尊跋隨說隨哭戒勝譯師亦唯有對注全無言答更念彼貴為人王尚如是珍重聖教不惜身命我安享苾芻於心何已也遂又不顧道途艱辛身命危險應拉尊跋之教是時譯師有云二十七者年應為丁丑但依余算應在丙子因彼傳自許譯師依尊者十九年尊者圓寂於甲午年故亦有云尊者圓寂於己未年者拉尊跋遣百人隨從譯師云甚多僅與六人俱有云其五人者携金趣程時拉尊跋送行又囑云汝等為我作事故今雖艱辛然須拚捨身命前去回時我當酬報深恩也又囑云萬望祈禱大悲尊者而行也次行跋薄尼帕爾地界遇一空行人彼告曰汝等似遠往他方求辦大事者可誦言而行事能成辦敬禮三寶尊願雪山國內一切勝本源正法得增廣此文含種敦仁波卿之諱法增及號勝本在內如是口誦而行途中無諸災難也問云汝為誰耶對曰漸次當知次行至跋薄邊地於民間借宿住於竹廬彼知有金欲焚殺之譯師主伴俱疲復加熱度逼急不覺睡去次來一白衣人啟戶而入喚云莫睡莫睡宜速起莫逸今當起趣途若睡當失寶及命我是藏地總本尊藏地是觀音化土也譯師等急起逃去至天曉時與跋薄小王赴印度者相遇結伴並進漸至恒河日已西沒船少人多王勢大先行譯師念今日不得渡河即將金埋於沙中異處眠臥見一船夫身著白衣徐搖槳而至譯師問云汝名為誰欲何所往耶對曰是迎主伴眷屬來大心有情至此時聖若不現船及師恐怖之時不迎送具惑有情何能辦七百無餘持上此徐徐度至迦摩羅譯師等遂取金登船疑而問之為誰對曰具壽初共時不違識謂不造次相交正共時不少愧謂交人時不作可愧之事後共時不情短謂非久交反仇也無能時饒益必須時即至久共者必不可必少此三語言救諸緩急漸次可知也少時度已告云今已中夜恐有毒蛇盜賊之災可直往比札摩羅即前文之止迦摩羅寺之異譯門下睡說已他去譯師至彼寺下時精進師子在門房上問云此是化身非實精進師子汝等為何處來者曰我是哦日來者彼曰若爾有一守門童子可將汝等財物寄彼而安眠遂將金財交付童子彼取金置內告曰寄財如寄怨寄以害事也寄子如寄心然能為心依者即是勝伴謂無欺者也汝等可安心睡也時譯師念云如是少年能出此語定非常人遂安然而睡次晨寺門初開內出一童子口作藏地牧場之語問曰汝等何處來者途中無怖耶對曰我是哦日來者路途平安汝為誰耶彼答曰我亦是藏人然我等藏人言多心緩要言不知秘但諸大事須隱密而為在藏人總室問之可知未說而去譯師主伴行至長衢遇一老仙髮鬚色黃長垂目赤肉乾持一芭蕉枝問曰汝等何來何往欲作何事對曰我等自哦日來迎請阿底峽尊者精進師子居室何在彼急依枝回視告曰今早兒童所說者為實藏人無喉結喉上筋結也下至於巷中遊人前洩露實情汝尚望成辦其事耶幸對我言無過今後除阿底峽前切莫出口精進師子前少說亦可我示住處時老仙緩行譯師等疾行而不及深生希有彼先至室門坐待復告曰成辦大事緩即是速欲情莫急山可徐登是此房譯師入內見精進師子閱梵文經典而住頂禮已供金少多彼問曰汝自何來耶遂將上緣詳告彼曰今後莫言迎請尊者只說是求學此處有上座囉那啊迦囉具大勢力亦是阿底峽尊者之主須依彼聽經攝護彼心切不得使彼覺知今可供金半兩言是來求學不請善巧者但願依止座下學成與善巧者相等願慈悲攝受也事亦莫急心莫不安當求學休息我等可漸設方便待尊者至此處而申請也次譯師為察精進師子之意故假做是言倘若不能請尊者可請彼下位之大德耶彼曰莫出此言若其如是則我前數年中縱請二十餘位已請訖然我藏地有情之性行汝寧不知乎除阿底峽尊者外更無餘人能調伏者尊者具有不共增上意樂今仍勵力唯請尊者方可也又問曰若爾更有如何之大德對曰大善巧者密如星宿所謂明了杜梋那跋種比跋然燈賢阿嚩都帝菩提賢響底跋寶賢清淨頂珠山賢月珠普賢天慧智覺語在自稱那薄跋勝敵海無邊須彌積伽伽河流星王遊戲金剛地蓋足智密蓮花戒法親龍自在王雲勢不思讓慧除熱惱戒自在等五十二位各具希有不可思議之勝德然除阿底峽尊者外無能饒益我等者也若爾頗示我尊者阿底峽對曰我藏人如此無勢猶引他人疑論汝自明朝可往僧園觀看於一千八百餘僧中威德晃耀勝出一切任何方觀殊勝難比任居何位端嚴無倫者即是阿底峽尊者汝可晝夜祈禱也次二人往參上座囉那阿迦囉頂禮畢供金五錢如精進師子所教而啟白請為依止上座慰曰所言甚善具壽我不放尊者去藏者並非有悋於人也然此處若無阿底峽者諸餘善巧未能調伏有情印度是佛教本源此若空虛則一切有情之安樂俱壞以是因緣故印度一切道場之鑰匙皆在阿底峽手中掌持倘若非爾者我亦悲愍藏地有情特為阿底峽一人之故致令藏王人財皆空實覺顏赤也汝若思念佛教可發大精進徧學一切我亦盡力導之汝藏人能代我印度人如是想者甚希有也云云次晨上座引譯師至僧園食處安置於學者位中譯師想尊者為一切大德所恭敬定居座首也無疑時見座首明了杜梋年邁德高見者生信問左右人曰此是阿底峽否對曰具壽何言此是明了杜梋月稱論師之高足善巧成就知否是阿底峽之師長也如是見響底跋那跋等年邁耆德一一指而問云此是阿底峽否何言此是響底跋大善巧得成就亦是阿底峽之師長此是那跋現代無人倫比亦是阿底峽之師長也如是徧問未見尊者何在懷悶而坐爾時有比札摩羅王是寺之主故以寺名代之踞寶座上諸餘大德過其前時曾不暫起次僧眾畢集尊者方至相好莊嚴觀之無厭印度人觀如印度人藏人觀之猶如藏人乃至諸天觀之宛如天人威德尊重顏帶笑容多數小鑰繫掛腰間少年苾芻擎香前導遙見其來王急站起因王起故一切僧眾悉皆起立尊者至大眾間空位而住時譯師念云一切眾人如是恭敬起立然座不見高此或是此王種或是餘大德或是阿底峽遂又問云此是阿底峽耶對曰何言此是笑勇金剛行住無定處之大善巧者也若爾此人功德何似耶對曰此功德量非我能測次譯師於殿門前誦讀心經至無色無受等之無字梵文原為阿字譯者讀聲為訶諸餘大德過其前時曾不一言次尊者至時含笑教曰具壽汝是俗音應讀色阿受阿也譯師答云此是一具足大悲心者德高無慢引發信心隨餘方人亦以餘言教誨倘談尊者而不隨定請此人也次早譯師讀色阿等聲仍不便尊者笑曰具壽澀滯觀自在之言指藏語亦無所惡直讀無色無受等可也譯師聞教信猶倍前隨其後見尊者惠施貧乏問諸貧人曰此是阿底峽否彼曰何言不遣阿底峽赴藏我等孤獨不斷腹兮下至乞丐皆密尊者而不告可見印度不捨之心此非阿底峽彼在餘處住也又一日尊者施食時少一貧童之分彼貧童隨尊者後呼云阿底峽跋羅訶跋達聞譯師聞之知是尊者不覺悲從心起痛哭而隨逐次尊者住而慰曰摩譯為希有是讚詞亦作悲歎詞用具壽汝真實心也謂汝傷心為實也莫哭我實獲過於汝藏地王民但我年已衰老復掌持如是多數鑰匙汝等今尚未捨可祈禱三寶也次一日請尊者至精進師子之房七百兩金供壇輪上將藏王為請尊者耗費之人財法王叔姪之痛苦藏地現時之邪法智光等請尊者之言詞一切奉白又白云今此具壽亦為請尊者而遣來我二人經如是苦難然所求終歸無果我藏地有情豈不可愍耶此公塘跋當此少年唯在聞思之時未至辦事之期豈不猶可哀愍耶今尊者惟願慈悲而行也云云尊者曰汝等之言實爾今藏王人財俱盡實為可恥我亦非悲心小也然聖教事大我今管八百寺之鎖鑰並有許多法事未圓年復衰老恐難成辦然我當使藏王叔姪之苦難汝等之辛苦絕不虛費今汝暫收其金莫言我欲赴藏可善學翻譯之事也是晚尊者供養度母祈問三事謂赴藏與佛教有無利益能滿否藏王菩薩之願心身命有無留難也白已眠臥夢中告云某外道城中有一內教神堂彼處住一瑜伽母明日可往彼問之次日尊者持貝子一握至其處設一壇供忽來一瑜伽母髮長埀地供貝子已言以藏來迎請之事告云赴藏有大利益藏王心願亦滿特依一近事利益猶大但壽減少也問減幾許曰不赴藏者壽九十二赴藏者壽七十二也尊者念云但能利益藏人壽短也短之不顧壽數此乃捨自愛他之菩提心次尊者謂譯師云可往金剛座處至已見一童子手持弓箭白尊者曰今請依怙赴藏此藏諸具壽悉可悲也說已頂禮而去時譯師問為誰住何處尊者曰明日金剛座北方有一瑜伽母舞躍而來可問彼也次晨坐而待之見一瑜伽母著鹿皮裙髮披肩背手執小鼓舞躍而至譯師問昨日之事答曰汝藏人反問我印度人耶說已他去次隨尊者往阿蘭陀寺尊者坐大菩提前右有前見之童子左有一紺色童女彼二人將肘置尊者膝上互相笑視譯師念云此男女被世法所惱互相顧視尊者何故住其間耶時童女曰勝前勝子號賢護住勝地已現勝行究竟勝行眾生依勝者父子我頂禮童子曰若於何處護勝事童女汝亦來我家增子受用及富樂歡喜共住除災難呵呵今尊者當赴藏矣說已他去譯師念云此二亦是化現遂問尊者前於途中所遇乃至今日所見者為誰惟願速疾赴藏尊者曰比札摩宮南門有一織布童女可往問之譯師依教往問童女略笑曰汝藏中近事有善名稱者為誰耶答曰有號法增者問云何姓曰種童女作曲唱云初於北方示降誕豈非阿底峽弟子汝知姓名及生處莫為欺誑反問我是彼常時現化身云云譯師聞已大悟初所遇之空行次竹室之救者渡河船師守門童子門上精進師子門內之藏童長衢之老仙乞食之貧兒持弓之童子昨日之子女皆是種敦一人所化初僅遙聞未起信心彼實觀音示現倘若早知往彼祈禱何致經此大苦耶今知得信惟願一切時中慈悲觀照也譯師知請尊者有種敦仁波卿翻譯有精進師子自實不須勞苦心為之一安也又一時尊者師長號都訶囉者授尊者觀地之幻鏡一面曰汝今將赴藏地有一勝地北有依山南有平原林木茂盛汝之徒眾建多寺院集諸僧侶宏揚正法彼時須此也又於一時修曼陀羅內供有一瑜伽母詳為記莂赴藏宏法盛業尊者後漸次請問法鎧種比跋啊嚩都帝谷蘇鑪明杜梋及諸本尊一一皆蒙受記勸勉尊者只因佛教事大又恐為上座囉那阿迦囉等所知國王等為作留難遂遊禮聖迹行住無定也
