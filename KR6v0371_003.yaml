body:
  text: 世界佛學苑漢藏教理院法尊譯述第四節赴藏途中宏揚聖教第一目起行之前途中宏法事迹者謂次於一時尊者至金剛座處二位譯師頂禮足下面為淚洗重將前緣一一廣陳尊者應許遂將一切寺院職任方便交卸所有法事悉皆圓滿決定赴藏作遊禮聖迹而行但若多備行裝又恐上座覺察若不設備則三十一䭾經像等物無由遷運譯師亦甚焦愁忽於一晚有父子二人逐犛牛三十一頭至寺尊者經像盡載無遺中夜過已逐牛而去亦是種敦化現次日尊者往上座前辭去我引此藏地諸寺具壽朝諸勝處略行供養於未回時願安樂住上座曰如是甚善我亦欲往朝禮可追隨數日也遂同至金剛座行供養已尊者告諸眷屬曰印度邊國支那帝黎有一大臣欲建僧寺請我加持地基我前年無暇未去今當赴彼汝等可回也餘衆多返上座等六十餘人仍隨其後如是漸次禮諸聖迹後為彼臣定地基已尊者謂上座曰長老我今往朝密多羅寺路途遙遠汝不辭勞苦耶上座知尊者是赴藏遂告那錯戒勝譯師曰具壽汝謂我是來學我今知已汝是藏王遣來盜我大德之人也前次來請是我未放今放不放我亦自在然今尊者意樂清淨欲行若不放者則成利他之障難具壽亦必不喜汝是我弟子故不喜則違三昧耶又汝藏王實可悲愍令其人財俱盡而無結果我亦羞恥今借與汝三年次須送回不爾者則我二人無三昧耶也譯師念云印度西藏相隔懸遠往返途程三年可盡即就專住藏而言三年亦難令藏人生諸功德三年後若仍送還者則請去亦無大益若不還者則違三昧耶今當如何自於無人處涕泣而住時見一童子乘馬持杖遙來至前問曰汝形已出家何事如是痛苦耶告其所以童子曰世間少學利信受猶為稀我今教汝一事能依行耶譯師念云昔於此類未曾頂禮今須頂禮而問遂為頂禮彼曰戒衣任何惡謂任何惡劣但著如來法衣不應禮俗身且莫頂禮今所教者謂今汝不壞三昧耶而能使阿底峽乃至壽存皆可住藏汝明日臨行時可頂禮長老足已請其慈悲攝念並請以足摩頂白云乃至未見願安樂住時長老定作是言如昨日所言三年後須送還三年之中速學功德願汝師徒皆無病難安抵比札摩羅汝亦可續前所學也長老教訖可如是白謹依師教但有三事啓請二請師前一是我辦也謂我當請問聖觀自在及佛教主師長如是教藏地又如是為當送還印度抑留住耶爾時勝者父子指佛與觀者若云送還者我即送回印度若云留住藏者則請其住藏倘若勝者父子不授記者我亦當送還印度此事願垂聽許爾時即入具壽之手也譯師受授歡喜無量次早如教啓白長老曰具壽實如是須請禱於佛菩薩也佛菩薩必無顛倒佛菩薩云送還者即當送還云住即可住若不記莂亦當送還具壽若無阿底峽者印度悉皆黑暗以是故僧衆多寺院空虛故願汝師徒無諸損惱利益有情也云云時尊者教譯師將金分四份一供諸師長一供金剛座一以長老為首供止迦摩之僧侶一份交付國王供一切僧衆悉交長老帶回發願而分離也自印度動身之年有謂戊寅壽五十七者有謂庚辰者有謂壬午者之三說今取其中者以傳說譯師住印度三整年計前往後近共住五年故第二目途中降魔次尊者主伴二十五人精進師子主伴三人戒勝譯師主伴七人共三十五人朝密多羅寺已漸至邊界時外道聞知恐尊者至藏興隆佛法欲作留難有十八無慚裸形外道以通力趕至尊者知其惡心以度母生起次第縛劫賊法而縛之悉同泥塑無諸覺感次至跋薄界內尊者嘆曰魔羅外道以諸惡心徒自衰損以解咒咒於沙礫交付商人告曰途中有十八外道無所覺感可以此沙撒其身上爾時起立汝等勿懼是我見其惡心而縛之也次商人依教撒之外道突起問商人曰我等如何耶商人告曰汝等欲為阿底峽尊者作留難尊者暫為縛耳今以悲心放釋也外道聞之遂返次於跋薄邊界行時有一散王見尊者之旃檀小床乞之尊者曰此是持藏送人者未與次日王遣盜人於途劫之尊者以咒咒地超出其前並縛其盜客後復釋之次至帕跋響拉尊跋菩提光遣迎者六人亦至於多羅樹蔭設廣大座尊者居上右以精進師子為首坐諸藏人左以精進月為首坐印度諸師於二列中間向尊者座設西印度王位另有緣起茲不繁録哦日迎者以價值五兩純金之磁杯滿注酥茶供奉又奉白色寶馬衆寶嚴飾六人又各供白綢一匹尊者甚喜次跋薄王迎尊者至宮廣申供養至第三日夜供三寶時精進師子白尊者及衆人曰今有塢波索迦我回自性界也是夜現重病明日圓寂時衆人驚怖尊者亦示現憂惱謂我今赴藏亦無益無舌故藏人無令精進師子不死之福也次往跋薄平原遊觀尊者將所騎大象名曰見願授與跋薄王無邊稱告曰大王我此大象若騎至藏藏必不能活今授與汝我欲於此建一毗訶囉寺寺所需之土木等物可用其駝負亦可載運如來等物莫用載諸餘物及乘騎鬪戰等大王汝僅養此象王諸餘怨敵自然消散但此寺所需一切乃至未竣工以前並印度及藏僧住止所需皆願王惠給除此之外吾亦不作此象值願王知之國王聞教深生歡喜禮尊者足一切應允並將王子蓮花光供與尊者是尊者來藏攝受之最初弟子尊者後將王子交寶賢譯師學梵藏譯經等事後又依戒勝譯師學尊者之功德次為跋薄毗訶囉之住持諱曰天王或天帝天增上天自在皆可至藏宏法者如是住跋薄一載將諸有緣立於正法已次尊者赴跋薄邊界跋薄王臣共百餘騎護送拉尊跋遣四位大臣領三百騎來迎衣馬莊嚴悉為白色幢幡音樂悅耳歡目時諸迎者異口同音稱揚讚賀慰問疲勞文繁不録尊者亦歡喜讚曰如是鮮白嚴飾說正法語依此諸臣觀之則法王拉尊跋實與帝釋天王而無異也次大臣天自在供一觀音聖像尊者甚喜立刻開光讚云觀音自在三世依為利他故被進鎧大悲自性無垢輪除衆生苦我頂禮我今來汝世界中惟願悲護利衆生諸餘臣衆各供白布一匹時尊者答衆人返問曰我今來至此世界生死林中雖無樂遙途四大獲平順法王眷屬安樂否初一句一事次二句一事後一句反問諸臣齊聲答曰大天指智光然今承三寶所庇拉尊跋及諸眷屬悉皆吉祥也次至無能勝池岸彼處牧民供養甚盛住七日時尊者至池岸緣於池水施甘露水譯師隨至見池中間有觀音像掌中有白色紇哩字從字流諸甘露有無量餓鬼圍繞飲用除意熱惱學施水法等次大臣天慧與十騎先返啓拉尊跋曰一切智稱尊者至跋薄時跋薄王臣承事供養歌讚伎樂遙迎遠送昔佛在世未聞有如是者也跋薄王子出家諱曰天王王及王子俱馬百騎護送尊者尊者大象留於跋薄修毗訶囉備充梵藏一切僧衆所需其王亦以王子為首將一切受用悉供養於尊者今已至無能勝池岸一切智之眷屬有三大巧者及公塘譯師等更有西印度國王亦來護送係送妙吉祥金剛像來總之迎送共計四百二十五人現在無能勝池岸饒益有情不久即至金殿願心歡喜也菩提光聞之喜超言外急遣人馬往金殿嚴淨道途莊飾住所並通報四方聚諸有情歡迎尊者時諸有情悉作是念拉尊跋二代殷勤難行請來有何希有今須觀也次尊者至金殿時四方來者堵塞道衢遙見跋薄王等如三十三天公塘跋等三藏法師三十三騎如天覆地作大善巧之裝飾前後圍繞特有利他賢大善巧者住尊者右精進月處左智炬及西印度王桑迦處於前後總之共四百餘騎圍繞中間尊者騎於見願風翅馬上超馬一肘身處虛空猶如日輪光明晃耀相好莊嚴觀者無厭雖前無信任運令生信根有者固不待言也見是希有同聲呼云我今歸依佛薄伽梵印度法王五十二大善巧之頂珠依怙阿底峽佛聖教主此五句是尊稱尊者惟願慈悲觀照我等藏地惡業有情喇嘛佛寶願成熟我等度脫我等云云尊者喜曰藏地有情於我有如是大信皆是大信種性希有三寶願慈悲攝受我之所化說已普觀衆會而加持之時有智光之妹出家者曰法億取項上所帶之松兒石價值五十兩金供上尊者合掌請曰依怙阿底峽願受此寶少垂聽允我見智光為追祖王之法規宏益濁世之佛教捨諸身命受用不幸遭惡人手今請尊者為除諸惡有情惡邪見故久住藏地又拉尊跋叔姪二人為益聖教迎請尊者用盡無量人財經歷無量衆苦藏地諸惡有情未知作何毀謗願念自他久住藏地使藏地佛日增輝云云尊者慰曰善天女天女是尊者王女於今濁世稱為三界法王阿底峽者即我是也善天女我今來藏若不建立佛教基礎於印度百八寺院實覺慚愧謂難回印度也法王指智光虛死未能酬報也善天女汝等一切所願我須當成辦也次赴蓮花洲尊者告跋薄王曰大王今請歸國速建毗訶囉寺務使高大寬廣更當立如來八歲像木刻度母像不動明王像香泥塑觀自在像及無垢頂髻像等盡力為之又前存王宮之五十餘聖像皆請入寺如是一切務於九月圓滿開光等事祈告我知云云時王受教與三位大善巧者將辭歸國大臣天自在急奉信拉尊跋曰依怙阿底峽現至蓮花洲跋薄王將與三大善巧者回國建寺惟願速來迎接尊者敬謝跋薄王等拉尊跋聞知急與五百五十騎並請樂師迎於蓮花洲請問安泰並謝戒勝譯師之勞文繁不録又以無量供養敬謝於王並供良馬三十二匹跋薄王深生歡喜將純金二百兩注一盤中使王子天王捧持奉與拉尊跋並將王子付之留藏地求學也文亦甚繁第三目說深奇法大轉法輪王及三大善巧去時拉尊跋送一踰繕那臨別時供三大善巧各純金一兩之金花請於建寺完時重相拜謁次迎者約九百人並諸幢蓋音樂迎尊者至王自住寺請曰於此藏地與其以深深奇奇之法攝受願以業果之法攝受也尊者喜曰所謂深法唯有業果較諸見本尊者能於業果得決定信為上也昔有一閻曼德迦瑜伽者見本尊身竊自念云我以此小事不致墮落稍染僧衆資具以是因緣生餓鬼中形同閻曼德迦又止迦摩羅尸羅寺有一執事人將僧今日供養改作明日以是因緣即於彼夜生餓鬼中又一僧中上座於僧衆中有大勢力私用僧米半升生餓鬼中極少勢力說此多緣已許諾以業果教化藏人廣為拉尊跋等傳授多法爾時藏地諸三藏法師依佛聖教抉擇衆疑並問尊者許何宗見尊者返問汝何所許彼若答謂或中觀或唯識等尊者亦云我亦許彼並廣說彼見所依之教理極善成立時有號慧明者請尊者曰尊者何故不說自見唯順他說耶告曰我亦是隨佛學之苾芻故順所化之意樂而答也又有號德慧者請曰若爾尊者自許為何告曰我無所許請曰就勝義雖無所許然依世俗如何許耶尊者曰如具翳者所見毛輪此一切法皆如是住謂世俗幻現菩提道次中廣抉擇此義又有問云現境為遣不遣尊者曰如無翳見飯此喻下文當釋汝可自己觀察也又問云於理智前有法顯現否答曰不現然不現有二一無故不現如兔角等二非彼境故不現如眼識不見聲等此是非境不現有法指世俗諦理智為緣勝義之心故非其境也又有問云佛地有智無智猶如問佛位有淨識否蓋有一派許佛位唯有勝義不許世俗諦法智慧是世諦故不許然佛所現之色身及語業等則唯屬有情自識善根所現如如意珠雖無作意能滿衆願也尊者戲曰我不曾成佛不知也又曰如諸幻師迷諸愚蒙汝可自觀時諸人無語尊者曰汝藏人況言中觀即說唯識亦不堪也猶云非汝等所能解尊者又問曰汝所許之中觀如何取幻喻藏人曰如咒石木現似象馬尊者不喜曰藏人敗矣是唯識以下之軌也請問云若爾中觀當如何許告曰如咒虛空象馬亂現許有木石等依則許顯現所依為有如小乘之極微唯識之依他起性如是顯現指現前一切世俗法亦唯有種種現相而已若此所依之實法如小乘宗瓶所依之極微唯識宗遍計所依之依他起雖就世俗亦不許有也此謂一方面為幻有一方面為性空二諦成立若夫非幻非空之實法則不許為有也尊者未至藏前藏人各許為中觀見尊者後則無一人能真達中觀之見者爾時有重請者曰前所說之翳喻如何許耶尊者告曰印度有一老母其子事之至孝後因行商他去告其妻曰乃至我未回當好事老母其妻依教極善敬事老母因飲食過潤致減目明見飯中有髮疑食至腹遂覺腹中有病恨其妻子歸母告之子責其妻妻曰我實敬事母自目亂汝可自授其食也子遂煮美食以奉母母見如前呵曰婦如是作汝亦爾耶子曰是母自誤可收此食請母暫存也遂延善醫外洗內服目明如前自見食中無髮腹病自然而愈亦如中國杯中蛇影之喻三藏教法治其外師長教授醫其內慧目發明幻髮俱遣也藏人聞教辨才塞結深生希有疑情盡除也又於爾時寶賢譯師建有三重密殿自覺學高時彥德超羣賢顯密諸法自已善巧雖阿底峽至亦無可請之法但我係藏地大人彼係印度善巧又是拉尊跋叔姪二人殷勤請來必須歡迎方好也是夜夢中見一白人告曰我作衆生事理應起慢然為迎請尊者猶受無量苦難汝今不知應請問者尚多總合印度西藏一切功德不滿阿底峽之功德藏人未能得一切教授也云云未及返問而化譯師醒後念云定是一有大悲心者夢甚善次日遙迎見尊者身行忘諸厭足漸至住處下層殿時是層專供小乘聖像尊者以梵語先作七支讚頌次於一一聖像作一讚任運而成不假思索如是中層專供顯教大乘聖像上層專供密像尊者亦依各各經教及儀軌各供一讚譯師聞此知其詩詞善巧顯密通達實為教主也捨諸慢心殷重供養詳問印度歷史尊者不為增益損減應答如流又請問云善巧何德尊者曰為問共者抑不共者譯師曰共者固甚善巧謂問不共者耶曰然也尊者曰吾此及此等善巧也譯師未曾聞名者甚多慢心至此時甚寂也次尊者依律藏經藏論藏並諸密典問曰此解耶此解耶譯師皆答善巧尊者喜曰有如汝者我實無須來藏也是夜住其殿中譯師初中後夜於下中上層分三處修尊者知彼未能融化一切次日問答多法已尊者反詰曰譯師法見廣大然彼諸法攝於一座當如何修對曰依各各儀軌所說而修也尊者不喜曰譯者腐矣藏地仍須我來也譯師請問尊者如何修尊者曰任住何處與誰共何威儀皆須以戒律為基礎修一切有情是母一切所現惟密輪諸尊悉無生若不能總合必不得心要云云廣說修行之法恐繁故止譯師聞教深生歡喜讚云善巧天中天淨勝身戒嚴二利圓財富願導我解脫我以教理炬照見汝密德昔與言教違今當如教修遂供金七兩請勝樂輪次第及度母加持得加持時心生賢善證得復以金八百兩為首除經像不應供養者外盡諸所有供養無遺譯師先雖善達經論然修行之教授謂依尊者始得也爾時尊者造有攝三昧耶論譯師譯之極盡善巧尊者曰今須隨我翻譯也譯師示其首白曰我頭白至此矣願稍修也尊者復教其莫放逸等譯師奉教釘其戶於門楣書云若於此室中起凡愚分別願諸護法裂頭百瓣如是專一修行致本尊現身等云云次戒勝譯師謂拉尊跋等曰尊者住藏僅可一載諸請法者宜急請之拉尊跋供金三百兩請曰今藏地有情以無善知識所攝受故於甚深廣大義理依自虛妄分別互相諍論願除彼疑後依共乘二問顯教二問密教三問願將慈尊及龍猛傳來教授一切大乘深義文少義豐如師長自所修習作一善論又願將佛智足傳來集密之教授造一曼陀羅主觀音修行儀軌尊者曰藏地已有龍猛菩薩之寶鬘論較彼好者不可得也然依所請造菩提道炬盡釋時疑又造觀音儀軌此時譯經亦甚衆不録爾時拉得王亦出家菩提光之父將一切出家衆安立於戒律一切密咒士安立於三昧耶一切居家安立於齊戒聖像未開光者開光頽壞者修茸一切善業建樹無餘拉尊跋見觀音身上座金海依尊者教授得大神通如是獲益有情難盡録也
