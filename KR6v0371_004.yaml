body:
  text: 世界佛學苑漢藏教理院法尊譯述第四目請赴拉薩尊者住王寺六月零二十五日滿足拉尊跋之心願已時跋薄王及三大善巧建寺圓滿請尊者開光尊者遂至金殿寺時戒勝譯師欲送尊者回印度但此時未見本尊及師長所授記之隖波索迦念云豈非瑜伽母有所欺耶其大善知識種敦仁波卿勝本者誕生北方姓氏曰種歲次甲辰宋真宗七年其母先過又娶續室一日續母搆乳童子打牛牛走乳傾母痛打之童子雖幼心力殊特念云與此諍鬧不若他往為樂遂離家往他處覓食自供以求學次依賈地名在前藏漾勤波受五戒十五歲時有康地大德諱菩提童子有傳作自在童子欲赴印度者見已生信次大德西至跋薄住一載而返又會於玉如地在前藏請隨其後大德告曰汝明年可隨康地商來若今引去恐他人謗為竊誘童子也次歲年十七隨商人至康依大德十九年善巧顯密諸法初依師時承事師長與常涕無異唯未賣髓而已凡大德之馬牛豬羊他人供者晝則牧於山野夜則持弓箭利劒乘一善馬遊行防範後於一日與諸學談論法義智勝一切法增隖波索迦之名遂徧聞於康藏爾時種敦仁波卿念云得此難得有暇圓滿暇有八滿有十如聲聞地說之人身必須修一真實佛法但現所學者為足不足須請問印度之大善巧者請問須能自言不待譯者方善遂依印度三藏法師聲刺即念智法師之異名此師功德甚重恐繁不錄學梵文語次年三十有八大德菩提童子告曰今可與父相會授記尊者也賜與經書馬匹遂辭師西上聞傳云哦日拉尊跋請阿底峽尊者來藏不久仍回印度也種敦仁波卿聞而生信自北路行至前藏場喀梭曲以法教化彼處之官呼為筆穹未知正諱彼供與㘃真阿蘭若請留供養種敦曰汝可改此惡行建設宏法處所明年有善慧譯師至請彼宏法我今無暇須急往哦日謁大善巧者待我回時當受汝施更當於㘃真建寺也次往朝賈之漾勤薄又往謁藏王出家之菩提王啟曰今哦日拉尊跋迎尊者來藏我今請其來此願大德歡迎也云云次謂迦瓦姓釋迦自在曰我請來時當奉函座前爾時請勸勉藏人往拉朵哦日附近地名迎接迦瓦曰汝可盡力迎請我當勸眾往迎也次回家與父相見次依北路西上至三叉路未知所往忽有一苾芻至示其正路而去次又迷路忽有一鹿行其前隨之得大道爾時尊者住於補讓地度母告曰今過三夜至第四日隖波索迦當到可加持之尊者設備灌頂瓶等至日遣人俟迎午前未至尊者往村中受請去後種至諸人曰稍待即回種曰謁大乘師長雖剎那前後宜擇前者遂赴村中遇於長衢急急頂禮尊者手摩種頂說多吉祥願頌次返住處灌頂加持授與妙吉祥金剛聖像此像最有加持西印度王送來者時種仁波卿以三事請問謂印度有如何大德以前所學可入道否若依尊者當如何學尊者告曰印度善巧者甚多即我來藏時東印度𠳐伽羅每日出一得成就者汝以前所學未能入道唯承事師長入道今汝當依我住汝是我本尊度母等授記之弟子我此傳承有加持也云云是歲壬午種年三十九尊者六十一也是日尊者之施主供種酥油一塊種化而注為通宵燈供尊者前自是以往乃至尊者圓寂靈骨供於㘃真酥燈曾未間缺也次依大眾部律隔幔與未近圓者同室宿無犯之軌則是夜與尊者同室學諸教授尊者預約三日後起程返印度種雖申請赴前藏事未蒙允許譯師因前與囉那阿迦囉上座有誓亦欲送還拉尊跋雖願尊者住藏但亦未敢申請種亦不能太過然種仁波卿智力殊特另設方便對尊者前稱讚前藏拉薩桑葉等殊勝道場如來等聖像并僧眾之盛多并請白云彼等皆願尊者來藏也尊者聞之甚喜曰如是盛多之僧眾任何處亦難得世尊授記有阿羅漢住定有而無疑也遙向藏地頂禮又曰彼若皆願我去者我亦有誓不違僧教種聞之遂重請赴藏尊者許諾譯師急止之曰我不能赴地獄猶云我不敢墮地獄我與阿闍黎上座有誓也種無奈何遂函告前藏信是十九頌文迦瓦詳述尊者有赴藏意宜速來迎自己隨尊者赴跋薄開光時譯師總想急行種則總想遲延尊者之經像等物不放隨去隨尊者謂種仁波卿戒勝譯師西印度王等共二十餘人至跋薄已又建四座縛外道之黑塔種仁波卿建一大白塔曰吉祥塔譯師繪尊者及種仁波卿像種則塑拉尊跋及譯師像并尊者大像并繪跋薄王送哦日迎接眾會圖如是開光凡經二十二日始畢次回金殿寺為諸有情說法而住前譯師於跋薄欲送尊者返印度適值薩門得三處兵亂不能遂願心甚憂惱尊者慰曰心不必憂無能辦者無罪也譯師喜曰則今請赴藏也爾時尊者謂譯師曰那跋弟子智生善巧者有龍猛菩薩派中所須之一法未能請得意甚悔也譯師記其事尊者住芒盂一年建立白寺專待藏人來迎爾時迦瓦釋迦自在奉種仁波卿信已依信中所列之人數一一請集議接尊者之事信中未列枯敦尊主永仲然枯敦為蘆梅在拉薩南一切僧眾之上座極善對法俱舍等論學冠當世名與善慧譯師種仁波卿相等時人共稱枯我我是善慧譯師姓種三也枯見信未列及深生不樂欲先往迎接種為補之或云忘記或曰謝罪遂別眾先行眾見枯敦先去未散久延亦即起程枯之勢力可見一斑先後并至尊者甚喜時枯敦問種曰汝信中何不將我名列入眾數耶種曰大善巧清淨美稱善慧等是信之頌文等中已有之枯曰我是等字中之人乎愈為不喜恨念起於此也第五目拉薩途中爾時藏人請發心法尊者令設供藏人設花一盤多購糌粑自以為供設富盛尊者觀之曰供太惡劣心不能發全無利益遂白曰宜重設次戒勝譯師另設妙供方傳發心也次趣程赴前藏行至跋摩跋塘時有格喜阿蘭若者此是後時之稱生於康地諱自在幢宋真宗十九年歲次丙辰生神宗十五年壬戌歲圓寂於㘃真寺壽六十有七也欲往跋薄朝龐停跋謹途遇尊者頂禮供養請曰我欲往喇嘛龐停跋謹前惟願加持途中無諸留難尊者曰災難有之莫行我與汝法食可住此白曰乃至我此諸受用未盡不敢受食惟願請法尊者曰食我食有法不食亦無法遂將資具盡供尊者任香燈職不入眾聽法唯專學修行之教授次至拉朵絳時供敦永仲迦格瓦賈之格瓦勤薄迦瓦釋迦自在枯敦尊主永仲善慧譯師六人共議五事請決於尊者謂方便及慧隨以一支或單有方便或單有慧成不成佛菩薩律儀所依須不須別解脫戒謂受菩薩戒須先受別解脫戒否未得金剛阿闍黎之灌頂可講說密乘經否未得灌頂可否行密咒之行尊者曰汝等不具心力無智也較彼尚多拉尊跋途已問訖盡載於菩提道炬論中汝等所問者亦有之諸人取論觀之抉擇已訖辯才遂窮也途中事記甚繁今悉從略漸至寧錯三月安居眾中講現觀莊嚴論別為格喜悅兄弟等講密乘所作部之修法觀音之修法等格喜悅法自在悅是姓下三字是名上二字譯善知識修持六月十一面觀音現身次請觀音忿相修法馬頭明王等法也並請甚深守護尊者傳六字明請曰尚不足遂傳不動尊種仁波卿請易修而有大加持者尊者傳十一面觀音戒勝譯師請有勢力者傳閻曼德迦又請近成就者傳度母爾時格喜瑜伽者生於康地姓永名菩提諱菩提寶誕於宋真宗十八年歲次乙卯神宗十一年戊午圓寂於㘃真壽六十有四也後漸長母告曰我生汝惟令出家也今可出家謹依母教出家近園住親教處諸事繁雜無暇修行母又教曰住此無益可往藏中求學與諸珍帛送三日程臨別時發願曰願兒入藏遇善知識願遇已攝受願攝受已講諸教授教誡教已願如理修行教授教誡之法修時願我亦生汝前母子同修一切種智之道說已而回次西上遇尊者尊者知是法器見已無間傳建立三昧耶王念至一千八百遍現身自此為尊者近住之弟子也尊者住後藏一載利生不可勝計次行至根巴絳塘時尊者問曰拉薩山上樹有旗等之處有何也藏人詳述拉薩之事迹尊者曰彼處之上罩三層霞光眾多天子供養無間也我等亦趣彼行此是天眼次行至聞荼那時尊者以衣覆首而行問其故曰此山純以五寶所成見生貪心次至欽如時有一新婦見已起信盡摘首飾供養回家時家人起諍新婦投河而死尊者行容時聞知其事嘆曰我女可悲也遂住五夜為彼女故建淨惡趣曼陀羅印塔甚多曰我女心已滿足矣又在欽如時有號德勝者供酥一包尊者見彼手有輪相傳大悲念誦法未久現身次至朵地住於北崗尊者曰此處出一具希有妙相之菩薩次住桑耶寺爾時眾會圍繞尊者思盥漱瑜伽觀其面輪而知急下馬取水以進餘人盡笑菩提康呆子無餘可供而供水對曰菩提似呆實有大慧尊者甚喜曰阿梅是瑜伽者之別號唯類一印度人也次至桑耶住北迦洲寺之異名爾時拉尊菩提王為施主造次第儀軌等次赴迦曲枯我二人請講中觀六論密乘諸不共教授多傳種仁波卿餘人請法尚眾爾時有二童年苾芻至尊者前一曰欲看水徧處三摩地否尊者曰欲自眉間化水漸次全身俱化一曰欲看白色徧處三摩地否尊者曰欲亦自眉間現白漸次徧白次從定起仍漸收於眉間尊者讚曰三摩地善次往欽樸時彼二後至一曰欲觀如幻像耶答曰欲見一像上有三世諸佛現十二相一曰欲觀如幻三摩地耶如前答見一度母像顯現如真時尊者前唯一求寂次早僧食時求寂徧觀眾中未見彼二人白尊者曰此二人何往尊者曰彼等不入眾食是地神樹神等供養也又尊者於上層殿繞行有一老尼見尊者行於虛空言於瑜伽者瑜伽者告善慧譯師譯師請問尊者尊者曰尼目誤也又一中夜尊者及種敦瑜伽者住時尊者曰聞否白言何事曰我印度弟子祈禱搖鈴之聲時種敦用手擎髮聽之未能聞也又有多人聚桑耶北迦洲請發心法是晚諸善知識賀曰今日成多菩薩尊者曰若云發心則一人亦未能發也請其故曰無三寶供故白云若爾可不傳也尊者曰不傳藏人當譏議次藏中諸善知識欲請講現觀莊嚴論與二萬頌合釋時枯敦欲迎尊者赴雅瓏地名遂稱讚地方功德利生事大夏住拉頂寺名冬住塘摩伽平原之住處或寺名尊者許諾枯敦遂於眾中唱云今請尊者赴雅瓏欲聽二萬頌者可來雅瓏也時種敦知枯敦慢盛必無上妙承事供養遂私謂藏地諸善知識曰汝等可請尊者赴聶塘今雖去雅瓏然枯敦慢大未必能好承事供養爾時我設方便請回桑耶汝等可以馬上來迎也藏地知識悉皆允許次尊者赴雅瓏住塘摩伽枯敦供雜金百兩純金僅數兩請講現觀莊嚴與二萬頌合釋辨法及法性論等諸顯教並請閻曼德迦修行方便等諸密法次枯敦自住拉頂果不殷重承事並嫉恨種敦毀謗瑜伽者時瑜伽白尊者曰今枯敦亦見毀願不為近住不當傳者也尊者不許再三辭之爾時尊者年越六十其髮皆白去其帽置首於瑜伽者之臂告曰我生於印度東方汝生於康地是以往生之業而相遇今我頭亦如是汝能放置而不顧近住自可不為也瑜伽者泣曰若爾者則願乃至住世而為近住也尊者謂種曰隖陂索迦能有如是好心之人也時枯敦有千人尊者師徒不滿三百所有供事悉是微劣尊者曰枯敦如輪王我如黎庶枯敦受用如叨利我如餓鬼城也種敦白曰枯敦有所不喜我可自回藏耶尊者曰近事去我亦去近事住我亦住未許種去種又白曰枯敦必不放尊者去須善設方便始可倘若見放可往聶塘山有林木地有青草雖至嚴冬百花開敷欲請赴彼也尊者笑曰我有令枯敦不覺之善巧方便今可即行是夜師徒料理行裝未曉起程時尊者遣人曰汝可往枯敦處告云阿底峽已赴藏矣尊者復畫地以定力加持之其人奉尊者教往拉頂上已復墜未能登山餘人聞之欲告枯敦是日枯敦有事不欲開門其人曰汝今閉戶而住尊者已被種敦盜去矣枯敦聞言大驚急往牽馬馬名黑烏先時聞枯之聲即至其前是日偏不受牽久之方畢師徒眾人急往追趕枯告眾曰拿住種敦可重打之時尊者至聞之渡口禮應師在前行今恐枯敦作不利益種敦遂先去次尊者亦登舟入河枯敦一人追至急呼曰何故內弟子亦不見告豈不念我耶尊者答曰何不念我耶枯敦馬勢太猛一躍入水枯敦幾死枯敦又報怨瑜伽者不預告聞重請尊者返尊者曰大善巧者莫作是語枯曰若爾願賜供處尊者摘帽遙擲之枯敦無計遂請帽供養而返是夜種敦住迦曲尊者住聞地次赴桑耶閱梵文經論尊者曰印度三遭火滅印度無者此多有之並抄明顯中觀論華嚴經等寄回印度住桑耶時有阿喀格喜為施主講八千頌爾時場喀筆穹遣人來迎種敦種敦告曰我今無暇尊者住世承事為最要我須與尊者死別謂尊者圓寂之後方可他去是後若無壽難當受汝供並寫信三十六頌寄往又寄與妙吉祥金剛像防彼不信也次有榜敦以馬二百匹迎尊者赴拉薩時尊者牛馬之屬甚多世人謗為大欲諸弟子請曰此等何不賣之尊者曰汝等不知父母豈可賣耶次行至桑耶之山間住一夜尊者曰老馬可悲也次往觀之有一老馬前足陷入亂石次至賈皮寺名住半月次善慧譯師請往拉薩時大悲尊出迎化一俗人讚曰善來大善巧說已而去尊者急下馬彼已遠去眾人問其故尊者曰汝等見彼人耶答曰見為誰耶尊者曰彼是本尊大悲欲為頂禮未及也次至大招寺朝釋尊聖像尊者曰此是真實化身也命印度畫師繪釋尊像繪已尊者觀之曰不同毀之重繪重繪七次尊者曰今仿矣遂隨身供養本意寄回印度未遂後存聶塘時尊者住歡喜光耀洲今室已廢為四方來會之知識講顯密無量法教又善慧譯師為首請講中觀心論清辨論師自釋譯師錄其教授為廣略二種呈視瑜伽者瑜伽者曰如私教我者尊者曾專為瑜伽者一人講未免太深也第六目卓錫拉薩轉大法輪尊者住拉薩見希有相甚多復朝遇無量瑜伽母亦見一大阿羅漢並謂拉薩是一大尸林特為修密法之殊勝處時尊者歡喜幻現大招寺心無厭足日月旋繞住中修行時善慧譯師記前在桑耶虛空旋繞之事今特留意觀之實見尊者虛空旋繞足不至地白尊者曰前桑耶老尼所見清淨尊者實於空中旋繞尊者曰印度亦作是說時種敦為首藏地諸善知識請問繞佛之教授尊者曰諸有為善根更無餘大於旋繞者並廣說印度有繞大城得成就繞寺院得成就繞觀音聖殿得成就等歷史廣說旋繞之教授又旋繞時忽念云法王菩薩如何建立此寺何能得一史記耶殿是藏王松讚崗薄所建見一瘋狂貧婦著一破衣時現大欲無足時隨他欲而施謂尊者曰願至屏處見告至屏處已謂曰欲得法王建此寺之史耶尊者知彼是自性瑜伽母遂觀想頂禮供養答曰實所願也告曰若爾者可自瓶相柱處量兩工半有之莫告他人也次尊者欲開取時彼有一大勢守護藏神謂尊者曰若唯於今日抄寫則容取不爾則不與也尊者允許遂取出是日瑜伽者及種敦等四人極力抄之大半完畢稍未全時因筆墨不便故字多不清是書交瑜伽者收存今第五世達賴喇嘛所著之大招志即依據於此書也又一晨尊者謂瑜伽者曰有一瑜伽母行也白云何故得知曰諸天於虛空來迎請曰瑜伽母為誰曰時哭時笑之貧婦是瑜伽者急往觀之彼人已去矣尊者住拉薩一冬次歲菩提本請赴耶跋時菩提本為首有七知識廣請密法次有漾尊阿廓跋承事供養請求教授尊者曰善男子汝壽量短促所知繁多所知猶云法汝可修也修能多知聞僅少解云云又有一尼承事尊者是日去世尊者告瑜伽者曰彼尼已死白曰昨日尚來供養今日豈死耶尊者曰死已生天今來謝恩供養也爾時種敦往覓供具得財甚多供養尊者純金一百八兩以九錢為一兩計馬二十一為首一切供物亦共計百八數尊者自來藏地一日之供養未越於此者爾時種敦請問尊者之功德記錄成傳並造頌文讚之尊者曰我豈唯爾許德耶遂自略述苦行求法專一修行等事教曰汝等不勞難行而得深法有大利益當善行之又略說薩陀波崙法上菩薩善財童子等事迹謂曰諸承事師長者師長雖無所欲然有大因緣也圓滿自己之資糧故次迦瓦釋迦自在請尊者赴楞跋地名住一月時住彼講時尊者忽下座種請曰何事尊者口念南無佛陀耶南無達摩耶南無僧迦耶謂種曰近事有一極大之非人在此須降伏也爾時有非人名診迦欲害尊者未遂尊者修馬頭明王法降伏之次回耶跋後受榜敦所請赴聶塘時藏地諸大人悉至聶塘請法斷諸疑惑一切居家住於齋戒一切密士住三昧耶總之將一切道俗悉安立於三歸時稱尊者為三歸依者尊者昔稱菩提心者次至哦日廣說業果法類稱業果者今稱歸依敦其法派曰迦當者是後時之稱也爾時又有漾那穹敦等四善知識請講宗派時尊者略述根本數語告曰彼皆是分別於此短壽分別數之不盡當攝集心要也請曰心要如何攝曰當以悲心徧於五趣一切有情不忍其苦故當發菩提心為成辦彼故當圓滿二種資糧從彼所生善根當回向共同一切有情次當修內外一切法如夢如幻當如是攝一切心要也爾時有名寶師者請問尊者不加修行成佛之方便尊者曰我亦願也然不圓滿二種資糧之佛非我所知時藏地知識欲請教授漾那穹曰任請何法尊者唯教修菩提心而已尊者聞知曰漾那穹實爾印度亦有一如汝之歡喜教授不歡喜修者彼亦不信菩提心云云又種敦將自己所了解月稱派正義啟白尊者尊者向東方合掌曰現在印度東方唯持此見藏地有如汝之大有情福實不薄我無須來藏也說已並傳教授教授時至方傳尊者之見為月稱派至此始明忽於一日尊者問種曰汝云有花本冬日亦開花今花何在耶種敦遂請尊者至平原暖處取小花草以應前言尊者喜曰汝可為方便之極僅不成妄語耳爾時廣說供花之福德然有毒之花不得供養三寶又說地嚴花是青蓮之類唯以風大不能開放尊者又曰汝既如是愛花當加持此地令花開放也以尊者加持力故聶塘之花多非餘處所有又一日尊者曰我今日不與人會莫放人來是日有一人謂是印度送供者收其供物時彼之背中忽出一鐵爪直趣尊者握尊者之背壁未能傷害尊者謂此係印度外道恐尊者宏揚藏地佛法故作留難然未能果也又一日有印度二小乘苾芻具十二種杜多功德來參尊者請問法義尊者為講補特伽羅無我時聽受為講法無我時彼二人急覆耳白曰阿底峽莫說恐怖恐怖尊者嘆曰未能集聚殊勝資糧不堪學真空之義但以護戒清淨無所至也證小乘果亦須通達法空是月稱派之深義菩提道次論中廣說次尊者印度之弟子等遣使送供者至尊者問印度有何希奇新事彼云餘無所聞有一瑜伽者於大城建一小室修十二年得大成就現在化身無量依慈悲而說法又有一瑜伽母供五曼陀羅從曼陀羅出生蓮花花開七日不萎云云爾時格喜阿蘭若者住仰迦摩修法忽於一夜發大聲音聲後見一大蝎自下而螫急祈禱於尊者蝎忽不見次早尊者至問曰夜來何故呼我俱白上事尊者遂將守護瑜伽行者不動明王之教授盡傳於阿蘭若者此後傳法譯經等事甚繁從略不錄次戒勝譯師請假專修翻譯等事以種敦代之三月後有絨敦格瓦等諸善知識請顯密諸法種敦即函請譯師來共譯之是講集菩薩學論集經論入行論道炬論等次譯師請上中下三根等法尊者曰彼等諸法汝自善巧遂未更傳此後住藏中七年五月未講經論設有說法皆以歌詞代之依顯教者有法界歌出離流轉歌六樂歌菩提心歌等夜分多於空行母之會中依密乘深義為歌有見金剛歌行金剛歌修金剛歌金剛法歌等譯師蒙許譯之次譯師仍請假專修時尊者稍現病現供養本尊本尊現身病患悉愈總之尊者住聶塘時本尊現身不可數計曾於一月十五夜三世諸佛菩薩現身自是以往每夜初分必現無缺又於一夜夢中聞有婦女莊嚴之聲尊者念云此不可視遂閉目不視彼曰是汝母親汝亦不視耶尊者曰我母不在此告曰母親度母亦不視耶尊者忽醒見聖度母住虛空中以種種珍寶莊嚴其身又一日瑜伽者進食時見尊者仰面虛空口呼彌勒彌勒未能奉食而退次進時見尊者如前而退時格喜種敦曰阿梅莫使尊者飯冷尊者見慈氏身我等未能見也次食將至冷時尊者告曰持我食來請問前緣尊者曰今日文殊及慈尊來虛空中議論大乘法義金剛手防護魔難諸天子記錄今須畫彼圖也尊者自定墨範次鈎召東印度之大善巧者來繪色彩此像後存聶塘爾時尊者曰諸佛之身悉是金色請曰若爾何故各別耶曰為調伏彼彼有情所現各別也
