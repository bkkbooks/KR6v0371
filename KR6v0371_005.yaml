body:
  text: 世界佛學苑漢藏教理院法尊譯述第五節尊者之圓寂第一目圓寂前相次尊者謂種敦曰一切大乘經義龍猛無著等法規三世諸佛菩薩之大車軌道今付於汝種曰傳諸餘人大乘密咒種種教授汝何故將此而授我耶告曰除汝之外未得傳付之所也一日種敦閉尊者之戶而去尊者亦出外曰時已至矣種曰阿底峽於牆壁無碍著耶告曰印度亦作是說又尊者臨圓寂時凡有行止離地一肘時眾共見次尊者曰諸天供我奏音樂聞否種敦注聽未聞希見尚多又於一日尊者曰我諸師長自都史來迎我今亦往都史多天也種敦聞言不樂急奉函譯師譯師至爾時適值那熱跋弟子號智生者至跋薄不久仍返印度譯師聞之啟尊者曰前於跋薄言那跋弟子智生有聖者指龍猛教授未能請得今未忘耶尊者曰念之白曰若爾彼善巧者今在跋薄尊者曰雖然如是我今已老無聽聞力次當有來喚汝者爾時當去此中間共住我今過十月許亦往都史多天慈尊座前聽聞教授教誡然無始來唯自無伴我等亦不能常時共住汝必須往請譯師聞言涕泣次白言恩師是我請來住此受學一切顯密法要今去不應理我不去也尊者曰汝送我來此我一切法汝悉通達汝去雖不應理然大乘密教多諸留難汝必須去於此中間未行以來可供養莫間祈禱於我譯師廣設供養殷重祈禱經一月許有號達瑪菩提及釋迦慧者至述前說之善巧者現住跋薄唯願速去彼將仍返印度也譯師白尊者尊者曰我亦當往都史多天號虛空無垢天子汝當善畫我像我自都史來此加持汝當常時供養祈禱今一月中尚可現前供養也譯師晝夜供養又經月半爾時尊者之弟子悉皆會集共相議曰今師長將不住世我等之中誰當任持師長之教軌耶餘人未能答譯師應曰一切教中皆說功德由師長生承事師長我等諸人無如種者任持尊者法軌亦唯種耳時一切人多不喜種於譯師言故亦不悅時枯敦曰如種敦者何能任持尊者教軌阿底峽之教軌還是枯敦我任持而已其實所許都如譯師所說也時瑜伽者竊自念云以少福故唯事師長未能修行尊者知其所念誨曰若以身語意三承事師長不須另求所修也後時格喜阿蘭若者曰種敦阿闍黎為譯師瑜伽阿闍黎為用人唯我專修然所證功德彼二人高上爾時譯師恐彼善巧速返印度又恐尊者速般涅槃二苦逼切形容焦焠尊者告曰今可去矣譯師含悲祈禱而去時藏中知識有譏譯師忍置尊者而去之語種敦返呵之曰於藏地恩大者尚有誰能越於譯師之上云云第二目涅槃勝樂尊者臨圓寂時隨諸弟子根器品類各留一遺囑時瑜伽者及阿蘭若者欲望誨令自居閉靜請曰此後當如何耶尊者曰心捨世間謂心放捨現世八法也於此壽末莫離種敦彼二聞教心稍稍不安白曰同依師請法何故使依彼耶尊者曰是我加持也次尊者尚有餘金欲遣瑜伽者送往印度前已送數次說頌曰無病為勝樂喜施為勝施涅槃為勝樂心依為勝伴瑜伽者聞即領悟私謂種敦曰尊者今欲遣我送金印度然尊者去世恐難相見願不差遣種敦曰我當為請之次於言論之間種敦白曰瑜伽者我等尚須作事惟願此次莫遣尊者曰彼意樂賢善事能成辦故須彼去種敦謂瑜伽者曰尊者必須使去惟願依尊者教遂擇吉日起身於未起身之前夜自念必無重見尊者之分通宵涕泣祈禱雙目俱腫臨行者尊者加持金囊告曰莫觸此金途中雖有災難必不能侵瑜伽者依教結商而行途中暗被他盜置於屏處於食時有犬啣來歸主次為賊人所覺河岸待刼瑜伽者至賊皆昏睡未見而脫次至跋薄住宿民舍聞尊者圓寂噩耗時跋薄軌則有舍其舍者財歸舍主所得彼等聞尊者圓寂知瑜伽者是尊者所使必持有財寶恐瑜伽者私去遂夜圍其室瑜伽者悲彼愚人奪三寶財物遂於通夜祈禱尊者次早臨行將金藏與衣袖故棄布帛而出彼等取布帛時瑜伽者已脫去次遇印度王使交彼帶印度而返印度國法嚴正王使依教奉行無誤也次種敦白尊者曰我當依誰耶尊者曰未見有汝之善知識當以經藏為善知識乃至未得神通以來如盲射箭莫作他事業唯作利益佛教之事聖教在於僧眾僧眾在於持律當廣造持律之人也宏律即造僧有僧即利教教住則有情獲益故無通之菩薩倘欲饒欲有情必須從律著手若非爾者則如盲人射箭之喻也明矣又令種敦建立寺等云云種敦祈願後世相遇尊者曰此生之後不能相見然總有相會之時也尊者雖證金剛勝位永離分斷變易二死然為化度時機依惑亂有情之現見於甲午年九月十八宋仁宗三十二年也有僧謂乙未八月十八者棄置色身於聶塘受化身於知足矣時諸知識皆問種敦尊者遺體如何安置種曰當如大聖湼槃遂以火化希有傳記甚眾茲從略眾人食時枯敦念曰今種敦持去我全無自在遂持鐵鉗取骨少許印小塔數枚次種敦於牛乳注以香水取靈骨一一略浸水中而收斂之種敦念云若能得尊者靈骨及經書並少分聖像足矣餘人欲諍種敦心雖不樂然智深量宏未現不喜之相夢中度母告曰汝之所求者我當為辦也次第四日迦瓦釋迦自在乘一白騾涕泣而至種知己意能遂遂將鑰匙付迦瓦手迦瓦是枯我種三人共信許處彼有所教餘無所諍迦瓦依種意為之當大眾中謂種敦曰父骨子收尊者之靈骨應歸汝收也梵經理歸譯師此譯師二字指種故亦應汝存又將金洲大師像尊者最珍重者亦與種敦次將金洲大師所惠之金釋迦佛像授與枯敦枯敦意在此像正符其意以為種敦所贈深生歡喜將六字明王像留與瑜伽者將不動尊像與阿蘭若者將八座聖塔等與善慧譯師餘事尚繁次乙未年種敦講八千頌一遍餘諸知識亦就各自所善講一經論又為尊者建立殿堂供養處所第三章事業流傳教法增廣事業流傳者尊者之高足徧彌於印度隖僅跋薄哦日前後藏地各具殊勝功德宏揚尊者聖教然最要者則為種敦一人住聶塘時尊者將一百五十七師所傳之經論教授應誦傳者誦傳應講授者講授應密傳者密傳首題梵名者總有六千四百七十五種前後所學者尚眾種敦亦以三業至誠事師如佛尊者亦教法遇主瓶瀉無遺一一經論皆具不斷之傳承教理之依止有加持有成就非意造非分別故此派之教授可謂清淨吉祥之極矣又種敦前住耶拔時自念末世有情濁情深厚今師長在世必須請一永利有情之教授也遂日日中請問法義結以總頌之漸次集蘊成論曰問答摩尼鬘全論以問答為體純是教授之精華內分二十三品譯可十卷以上總攝頌文譯供有緣云爾菩提薩埵摩尼鬟敬禮大悲尊敬禮諸尊長敬禮所信天天指佛菩薩等非世間天神應斷一切疑應殷重修行斷惛睡懈怠應常勵精進念知不放逸常護諸根門晝夜三時中各三時也應數觀心體應揚己過惡莫求他誤犯應密己功德餘人德應顯斷利養恭敬高舉稱常斷應少欲知足酬報諸恩德應修慈悲心菩提心應固應斷十不善信應常堅固應摧伏忿慢應具低下心應斷諸邪命應法命存活應斷諸財物以聖財莊嚴應斷諸猥雜應住阿蘭若應斷諸綺語應常防語言見尊長親教應恭敬承事於具法眼人及諸初業者應起大師想見諸有情時起父母子想應斷罪惡友應依善知識斷瞋不樂心應趣安樂處悉斷諸貪著應住無貪處貪不得樂趣斬斷解脫命若見安樂法應常勵力辦何者應先作即應先成辦如是悉完善不爾俱無成常離罪歡喜若生高心時爾時慢應摧憶尊長教授若生沈心時應慶慰歡心二應修空性貪瞋境生時應觀如幻化聞諸惡名時應觀如谷響身生損惱時應觀為昔業住邊際閑靜如死鹿屍體應自隱其身應無貪而住應常住志願懈惰心生時爾時應自呵念戒禁心要若見餘人時應靜和正言斷怒顏攝容常應含笑住恒見餘人時應無慳樂施斷一切嫉妬為護他心故應斷一切諍常應住忍辱無面喜新交當面歡喜背後毀訾初見便交日久返疏常應自安住斷輕毀餘人應以敬重住教授他人時應具悲饒益莫謗於正法隨勝解樂欲十法行門中勵力無晝夜三世所集善回無上菩提福施諸有情應常時發起七支廣大願如是當圓滿福智二資糧二障當永盡不空得人身證無上菩提信財與戒財捨財及聞財有愧知慚財慧財共為七此諸最勝利是七無盡財莫為非人說非法器之人眾中觀語言獨居觀心念印度隖波䭾耶勝然燈賢智藏所造菩提薩埵摩尼鬟圓滿種敦請問法時善慧譯師住桑樸寺為五百弟子演說法義一夜獨居桑樸靜林文殊菩薩現身教曰汝雖善巧一切所知然未獲得至極扼要可將徒眾安於聞思自往耶跋聽聞深義現今法王及種敦觀照無邊生死大海晝夜時中造問答摩尼鬘論猶如金鬘無價珍寶遂將全論俱述告知剎那不見譯師見是希有復聞法音聞已不忘一字深生歡喜如登初地身雖無力心欲起飛遂入眾中教授教誡告云汝等可自精進聞思我今欲往耶跋二三月中請問法義如有要事今日抉擇此後乃至未回不可造次多事往喚求見增加散亂我今年老希求後世如有信敬當依我教今當唯携慧幢獨往一切所須由彼運送如我未還倘以欺誑妄言有事求見等等此是魔業必當制罰原為頌恐繁不錄時五百賢俊悉生疑念往日心性慈和曾不降責昨日獨居靜林今日忽示猛教言既決斷勢難勸留唯當依教而已次日日照西山一牛載物自乘一牛惟有慧幢事隨行出山口村人見之悉生疑曰往日出行騎駿馬五百隨行不減一人此為何事以至如此急入桑樸傳告餘眾譯師漸至耶跋啟白文殊教誡來此之因緣依摩尼鬟頌請問種敦往昔本生如何斷除無疑如何殷重修行等應觀為昔業句得二十生因緣次問住邊際閑靜等四句因緣時有迦瓦釋迦自在戒勝譯師並種敦之施主霞滾等在會爾時上至尊者異口稱讚種敦功德嘆責枯敦於殊勝境作非理罪種敦返讚枯敦功德止諸人語時戒勝譯師謂迦瓦曰汝可勸彼悔罪彼受汝語迦瓦自辭不堪其任返請戒勝譯師往勸譯師亦辭不堪仍當種敦自己慈悲方便教誨云云廣述種敦化身等事爾時霞滾作商人狀赴塘摩佉傳述種敦之勝德毀訾枯敦之非理時枯敦聞知喚入寺內詳問種敦現住耶跋善慧譯師等恭敬請法之實情時霞滾亦揚不識廣述一切善巧方便折伏枯敦之高慢枯敦深生敬信追悔前失欲往耶跋悔罪聞法次日入眾假曰閉關專修不許謁見倘有違者重罪不恕並廣述教授徒眾聞之亦唯有依教而已次早未曉攜一隨從一驢載物徒步而行悔謝前𠎝並善慧譯師請問之餘請問往昔與種同生廣作非理因緣等事如是等希有傳記譯可數卷茲不繁錄次尊者圓寂經一載已種敦欲他行時善慧譯師欲請尊者靈骨少分種敦告曰尊者靈骨我二人可各建一銀塔供養汝塔成時可遣淨戒苾芻來請靈骨我當分與今當暫存我處次種敦引尊者之三犬尊者前在跋薄途中見三小犬無人養育悲心携持至藏尊者圓寂後種敦養之持黑白二牛毛帳赴桀摩壠瑜伽者送金返依種共住次受場喀筆穹所請赴㘃真阿蘭若建立寺院請印度善巧鍛師立尊者之銀塔外為塔形內為曼陀羅善慧譯師依種敦銀塔為範立一銀塔遣一淨戒苾芻請尊者舍利供內枯敦聞之亦建銀塔鍍金供金銀二像餘人建塔等事尚繁不錄後時餘多損壞唯㘃真者獨存為藏地有情之總供養處也種敦住持惹真共九載七整年利益無邊有情高足五十餘人其中最主要者謂樸穹瓦童幢博朵瓦寶明謹哦瓦戒然稱三兄弟宏揚聖法徧於全藏至今藏地教授唯以迦當為盛故曰有持說行者此便住世間耳謹依廣傳略錄少分若有樂廣之士自當參閱迦當雷邦譯可六七十卷迦當宗派源流等阿底峽尊者共不共之勝德藏地佛法中興之事跡或可全窺矣法海深淵非我境文義誤失當悔除福施無邊諸有情速證無上微妙智
